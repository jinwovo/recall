name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # Provisions a Gradle CLI on PATH (no committed wrapper needed for CI).
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - run: gradle test --no-daemon

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build

  sidecar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedding-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Syntax check only — full lint/test added once deps are pinned for CI.
      - run: python -m compileall app

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/recall
      - run: helm template recall deploy/helm/recall > /dev/null
