global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: recall-backend
    metrics_path: /actuator/prometheus
    static_configs:
      # host.docker.internal → backend running on the host via gradle bootRun.
      # If running the backend in-compose (--profile full), use: ['backend:8080']
      - targets: ['host.docker.internal:8080']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
