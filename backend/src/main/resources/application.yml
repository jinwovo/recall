server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: recall
  elasticsearch:                         # used by Spring Boot's ES health indicator
    uris: ${ES_HOST:http://localhost:9200}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:recall}
    username: ${POSTGRES_USER:recall}
    password: ${POSTGRES_PASSWORD:recall}
  jpa:
    hibernate:
      ddl-auto: update          # dev only; use Flyway/Liquibase for prod
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: recall-ingestion
      auto-offset-reset: earliest
    producer:
      acks: all

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    tags:
      application: recall
    distribution:
      percentiles-histogram:
        http.server.requests: true
        recall.retrieval.latency: true

recall:
  elasticsearch:
    host: ${ES_HOST:http://localhost:9200}
    index: ${ES_INDEX:recall-docs}
  embedding:
    service-url: ${EMBEDDING_SERVICE_URL:http://localhost:8000}
    dim: ${EMBEDDING_DIM:1024}
  kafka:
    ingestion-topic: ${KAFKA_INGESTION_TOPIC:recall.ingestion}
    ingestion-dlq-topic: ${KAFKA_INGESTION_DLQ_TOPIC:recall.ingestion.dlq}
    retry-max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}     # retries after the first delivery
    retry-backoff-ms: ${KAFKA_RETRY_BACKOFF_MS:1000}      # initial backoff; doubles per retry
  storage:                     # raw-doc archive + claim check (docs/adr/0005)
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:recall-raw}
    inline-max-bytes: ${INGEST_INLINE_MAX_BYTES:65536}    # larger docs travel as objectKey refs
  semantic-cache:
    threshold: ${SEMANTIC_CACHE_THRESHOLD:0.95}
  retrieval:
    candidates: 50            # fused candidates before rerank
    top-k: 8                  # passed to the LLM as context
    rrf-k: 60
  models:                      # see docs/adr/0002 — model tiering
    primary: ${RECALL_MODEL_DEFAULT:claude-opus-4-8}
    balanced: ${RECALL_MODEL_BALANCED:claude-sonnet-4-6}
    cheap: ${RECALL_MODEL_CHEAP:claude-haiku-4-5}
  rag:
    judge:                     # post-hoc groundedness judge (docs/adr/0004) — fail-open
      enabled: ${RAG_JUDGE_ENABLED:true}
      timeout-seconds: ${RAG_JUDGE_TIMEOUT_SECONDS:45}
  llm:                         # provider toggle: claude (default) | groq (free)
    provider: ${LLM_PROVIDER:claude}
    groq:
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
      model: ${GROQ_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434/v1}
      model: ${OLLAMA_MODEL:qwen2.5-coder:3b}

logging:
  level:
    com.portfolio.recall: DEBUG
